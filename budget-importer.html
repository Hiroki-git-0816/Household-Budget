function importData() {
  try {
    const existing = localStorage.getItem("budgetState");
    let state = existing ? JSON.parse(existing) : { transactions: [], rules: [], gasUrl: "", apiKey: "", unsyncedIds: [] };
    
    // Merge: skip duplicates by id
    const existingIds = new Set(state.transactions.map(t => t.id));
    const newTxs = IMPORT_DATA.filter(t => !existingIds.has(t.id));
    state.transactions = [...state.transactions, ...newTxs];
    state.unsyncedIds = [...new Set([...state.unsyncedIds, ...newTxs.map(t => t.id)])];
    
    localStorage.setItem("budgetState", JSON.stringify(state));
    document.getElementById("result").innerHTML = "<span class=success>✓ " + newTxs.length + " transactions imported! Now go to your budget app.</span>";
  } catch(e) {
    document.getElementById("result").innerHTML = "<span class=error>Error: " + e.message + "</span>";
  }
}
